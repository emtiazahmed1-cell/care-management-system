version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: cms-postgres
    environment:
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password
      POSTGRES_DB: care_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cms-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cms-network

volumes:
  postgres_data:

networks:
  cms-network:
    driver: bridge
